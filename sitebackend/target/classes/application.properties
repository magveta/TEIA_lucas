# Server configuration
server.port=8080

# Carrega variaveis do .env quando existir (rodando de sitebackend/ ou da raiz)
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

# MongoDB Configuration
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=teia_db

# Opcional: URI completa do MongoDB (comentada)
# spring.data.mongodb.uri=mongodb://localhost:27017/teia_db

# CORS configuration (gerenciado via CorsConfig.java)
# Porta padrão do Vite: 5173

# Logging (opcional - para debug)
logging.level.org.springframework.data.mongodb=DEBUG

# Upload de arquivos
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Analise de curriculo com IA
ai.cv-analysis.enabled=true
ai.cv-analysis.base-url=https://api.openai.com/v1
ai.cv-analysis.api-key=${OPENAI_API_KEY:}
ai.cv-analysis.model=gpt-5-nano
ai.cv-analysis.timeout-ms=15000
ai.cv-analysis.max-chars=12000
